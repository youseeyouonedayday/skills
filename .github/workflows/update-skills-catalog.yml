name: Update Skills Catalog

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-catalog:
    name: Update Skills Catalog Table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for skill changes
        id: check-changes
        run: |
          # Get the latest commit message to check if it's a skill-related change
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"

          # Check if any skill directory changed
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files: $CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q "^skills/"; then
            echo "skill_changed=true" >> $GITHUB_OUTPUT
          else
            echo "skill_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run update script
        if: steps.check-changes.outputs.skill_changed == 'true'
        run: |
          python3 scripts/update_skills_catalog.py

      - name: Check for changes
        if: steps.check-changes.outputs.skill_changed == 'true'
        id: verify-diff
        run: |
          git diff --exit-code README.md || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.verify-diff.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update Skills Catalog table [skip ci]

          This commit was automatically generated by the Update Skills Catalog workflow.

          Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"
          git push

      - name: Summary
        if: steps.check-changes.outputs.skill_changed == 'true'
        run: |
          if [ "${{ steps.verify-diff.outputs.changes }}" == "true" ]; then
            echo "## Skills Catalog Updated" >> $GITHUB_STEP_SUMMARY
            echo "The Skills Catalog table in README.md has been updated." >> $GITHUB_STEP_SUMMARY
          else
            echo "## No Changes Needed" >> $GITHUB_STEP_SUMMARY
            echo "The Skills Catalog table is already up to date." >> $GITHUB_STEP_SUMMARY
          fi
